limit_req_zone $binary_remote_addr zone=treseko_update_check:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=treseko_update_status:10m rate=12r/m;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 25m;

  error_page 503 @maintenance;

  location = /api/system/updates/check-community {
    limit_req zone=treseko_update_check burst=2 nodelay;
    limit_req_status 429;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/api/system/updates/status(/.*)?$ {
    limit_req zone=treseko_update_status burst=2 nodelay;
    limit_req_status 429;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://backend:8000/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(informes|informes-internos|static)/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store" always;
    try_files /index.html =404;
  }

  location / {
    if (-f /usr/share/nginx/html/.maintenance) {
      return 503;
    }
    add_header Cache-Control "no-store" always;
    try_files $uri $uri/ /index.html;
  }

  location @maintenance {
    root /usr/share/nginx/html;
    add_header Retry-After 30 always;
    add_header Cache-Control "no-store" always;
    try_files /maintenance.html =503;
  }
}
