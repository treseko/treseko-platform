version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: treseko_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-treseko_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: treseko_redis
    restart: always
    ports:
      - "6379:6379"

  # El backend, frontend y engine se añadirán conforme se creen sus Dockerfiles
  # Por ahora levantamos la infraestructura base (Persistencia y Cola)

volumes:
  postgres_data:
